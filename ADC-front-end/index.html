<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criando Conta</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <h2>Não se preocupe</h2>
      <p>não vamos contar para ninguém</p>
      <br>
      <h1>CRIANDO CONTA</h1>
    </div>
    <div class="right-panel">
      <form>
        <h2>Qual é o seu e-mail?</h2>
        <input class="email" placeholder="E-MAIL" required>
        <div class="terms">
          <input type="checkbox" id="terms" required>
          <label for="terms">Li e estou de acordo com o <a href="#">Termo de Uso</a> e <a href="#">Política de Privacidade</a></label>
        </div>
        <p class="aaa"> </p>Você também pode criar uma conta com </p>
        <div class="social-buttons">
          <button type="button" class="google">Google</button>
          <button type="button" class="facebook">Facebook</button>
        </div>
        <a href="#" class="login-link">já possui uma conta?</a>
        <button type="submit" class="continue-btn">Continuar</button>
      </form>
    </div>
  </div>
</body>
</html>
